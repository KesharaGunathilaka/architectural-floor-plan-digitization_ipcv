# ── Preprocessing Configuration ─────────────────────────────────────────────

output:
  image_size: 640           # YOLO input size (width and height)
  pad_color: 128            # Letterbox padding gray value (neutral gray)
  channels: 3               # YOLO expects 3-channel (convert grayscale → BGR)

binarization:
  method: otsu              # Options: otsu | adaptive
  # Otsu automatically finds optimal threshold per image
  # Use adaptive only if Otsu fails on certain scan types

morphology:
  enabled: true
  operation: closing        # Dilation then erosion: reconnects broken wall lines
  kernel_size: 3            # 3×3 kernel; increase to 5 for very noisy scans

noise_reduction:
  enabled: true
  method: gaussian
  kernel_size: 3            # Must be odd number
  sigma: 0                  # 0 = auto-calculated from kernel size