# ── Model Configuration ──────────────────────────────────────────────────────

model:
  architecture: yolov8s     # yolov8n | yolov8s | yolov8m | yolov8l
  pretrained_weights: yolov8s.pt   # COCO pretrained; downloads automatically
  # Comparison experiment (run after primary training)
  comparison_architecture: yolo11s

# ── Training Hyperparameters ─────────────────────────────────────────────────

training:
  epochs: 150
  batch_size: 16            # Reduce to 8 if GPU runs out of memory
  image_size: 640
  workers: 8                # Dataloader worker threads

  # Learning rate
  lr0: 0.001                # Initial learning rate
  lrf: 0.01                 # Final lr = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3          # Gradual LR warmup prevents early instability

  # Early stopping
  patience: 30              # Stop if no improvement for 30 epochs

  # Checkpointing
  save_period: 10           # Save checkpoint every N epochs

# ── Augmentation ─────────────────────────────────────────────────────────────
# Floor plans are grayscale line drawings — color augmentation must be OFF
# Geometric augmentation is critical for orientation invariance

augmentation:
  mosaic: 1.0               # Combine 4 images into 1 training sample
  degrees: 90               # Rotate in 90° increments (floor plans can be any orientation)
  flipud: 0.5
  fliplr: 0.5
  scale: 0.5
  # Color augmentation — all OFF for floor plans
  hsv_h: 0.0
  hsv_s: 0.0
  hsv_v: 0.1                # Slight brightness variation only

# ── Evaluation Thresholds ────────────────────────────────────────────────────

evaluation:
  conf_threshold: 0.25      # Minimum confidence to count a detection
  iou_threshold: 0.45       # IoU threshold for NMS
  # Target metrics (used for pass/fail in evaluation script)
  target_map50: 0.70
  target_map50_95: 0.50
  target_inference_ms: 500  # Max inference time per image in milliseconds