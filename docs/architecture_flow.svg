<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Animated architecture flow for the floor plan digitization pipeline</title>
<desc>An eight-stage pipeline: a floor plan image flows through data prep, SVG to YOLO conversion, preprocessing, YOLOv11l training, evaluation, and export, producing an AutoCAD DXF file. Animated dots travel along the connector to show data moving through each stage.</desc>
<defs>
<style>
text{font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;}
.th{fill:#1f2933;font-size:19px;font-weight:500;}
.t{fill:#1f2933;font-size:15px;font-weight:500;}
.ts{fill:#6b7280;font-size:12px;font-weight:400;}
.box-blue{fill:#e9eefb;stroke:#4263eb;stroke-width:1;}
.box-amber{fill:#fbedd1;stroke:#e0930b;stroke-width:1;}
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<path id="flow" d="M100,150 L550,150 C630,150 630,310 550,310 L100,310" fill="none"/>
</defs>

<rect x="0" y="0" width="680" height="470" fill="#ffffff"/>

<text class="th" x="40" y="40">Architectural floor plan digitization</text>
<text class="ts" x="40" y="61">Raster image to editable CAD, powered by YOLOv11</text>

<rect class="box-amber" x="470" y="32" width="12" height="12" rx="3"/>
<text class="ts" x="488" y="42">endpoints</text>
<rect class="box-blue" x="566" y="32" width="12" height="12" rx="3"/>
<text class="ts" x="584" y="42">pipeline</text>

<path d="M100,150 L550,150 C630,150 630,310 550,310 L100,310" fill="none" stroke="#cfcdc7" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"><animate attributeName="stroke-dashoffset" from="100" to="0" dur="2.4s" fill="freeze"/></path>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.5s" fill="freeze"/>
<rect class="box-amber" x="40" y="111" width="120" height="78" rx="10"/>
<text class="t" x="100" y="146" text-anchor="middle">Floor plan</text>
<text class="ts" x="100" y="166" text-anchor="middle">image + SVG</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="190" y="111" width="120" height="78" rx="10"/>
<text class="t" x="250" y="146" text-anchor="middle">Data prep</text>
<text class="ts" x="250" y="166" text-anchor="middle">audit · stats · split</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="340" y="111" width="120" height="78" rx="10"/>
<text class="t" x="400" y="146" text-anchor="middle">SVG → YOLO</text>
<text class="ts" x="400" y="166" text-anchor="middle">bounding boxes</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="490" y="111" width="120" height="78" rx="10"/>
<text class="t" x="550" y="146" text-anchor="middle">Preprocess</text>
<text class="ts" x="550" y="166" text-anchor="middle">letterbox 1280²</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="490" y="271" width="120" height="78" rx="10"/>
<text class="t" x="550" y="306" text-anchor="middle">Train YOLOv11l</text>
<text class="ts" x="550" y="326" text-anchor="middle">mosaic · copy-paste</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="340" y="271" width="120" height="78" rx="10"/>
<text class="t" x="400" y="306" text-anchor="middle">Evaluate</text>
<text class="ts" x="400" y="326" text-anchor="middle">mAP@50 ≈ 0.84</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.5s" fill="freeze"/>
<rect class="box-blue" x="190" y="271" width="120" height="78" rx="10"/>
<text class="t" x="250" y="306" text-anchor="middle">Export</text>
<text class="ts" x="250" y="326" text-anchor="middle">post-process → DXF</text></g>

<g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.5s" fill="freeze"/>
<rect class="box-amber" x="40" y="271" width="120" height="78" rx="10"/>
<text class="t" x="100" y="306" text-anchor="middle">CAD file</text>
<text class="ts" x="100" y="326" text-anchor="middle">AutoCAD DXF</text></g>

<line x1="54" y1="122" x2="146" y2="122" stroke="#1f2933" stroke-width="1.5" opacity="0.4"><animateTransform attributeName="transform" type="translate" values="0 0;0 52;0 0" dur="3s" begin="2.4s" repeatCount="indefinite"/></line>

<g stroke="#1f2933" stroke-width="1.5" fill="none" opacity="0.45">
<rect x="80" y="278" width="40" height="9" rx="2"><animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="2.6s" repeatCount="indefinite"/></rect>
<rect x="86" y="283" width="40" height="9" rx="2"><animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="2.9s" repeatCount="indefinite"/></rect>
</g>

<rect x="484" y="265" width="132" height="90" rx="13" fill="none" stroke="#4263eb" stroke-width="2" opacity="0"><animate attributeName="opacity" values="0;0.55;0" dur="2.4s" begin="2.4s" repeatCount="indefinite"/><animate attributeName="stroke-width" values="1;3;1" dur="2.4s" begin="2.4s" repeatCount="indefinite"/></rect>

<g fill="#1f2933">
<circle r="4.5" opacity="0.9"><animateMotion dur="5s" begin="2.4s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle>
<circle r="4.5" opacity="0.9"><animateMotion dur="5s" begin="3.65s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle>
<circle r="4.5" opacity="0.9"><animateMotion dur="5s" begin="4.9s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle>
<circle r="4.5" opacity="0.9"><animateMotion dur="5s" begin="6.15s" repeatCount="indefinite"><mpath href="#flow"/></animateMotion></circle>
</g>

<line x1="40" y1="404" x2="640" y2="404" stroke="#e5e3de" stroke-width="1"/>
<text class="ts" x="40" y="426">YOLOv11l · CubiCasa5k · 6 classes: door · window · wall · staircase · toilet · sink</text>
<text class="ts" x="40" y="448">Team — Tharun Umesh · Keshara Gunathilaka · Dilanka Hewage · Ashan Munasinghe</text>
</svg>
